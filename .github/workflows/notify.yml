# In ewilpeers/new-testament-data: .github/workflows/notify.yml
name: Notify build repo
on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.BUILD_REPO_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/ewilpeers/new-testament-data/dispatches \
            -d '{"event_type": "data-updated"}'