# .github/workflows/build-and-deploy.yml
#
# Converts bible JSON → HTML and publishes to GitHub Pages.
# Triggers on push to main (when bible/ data or the build script change).

name: Export Bible to excel & Deploy Pages

on:
  repository_dispatch:
    types: [data-updated]
  push:
    branches: [main]
    paths:
      - 'bible/**/*.json'
      - 'ci/7excel_import_export.ipynb'
      - '7excel_import_export.ipynb'
  workflow_dispatch:  # manual trigger button in GitHub UI

# Sets permissions for GITHUB_TOKEN to allow Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: ewilpeers/new-testament-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data
          lfs: true
          
      - name: Debug - check CSV headers strongs
        run: |
          head -1 data/strongs.csv  
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jupyter nbconvert pandas openpyxl tqdm

      - name: Build HTML
        run: jupyter nbconvert --to notebook --execute ci/7excel_import_export.ipynb --ExecutePreprocessor.timeout=1337

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: excel

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
