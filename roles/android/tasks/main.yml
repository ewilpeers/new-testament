---
- name: Install OpenJDK 17
  apk:
    name: openjdk17-jdk
    state: present

- name: Install Android SDK cmdline-tools
  shell: |
    mkdir -p /opt/android-sdk/cmdline-tools
    wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
      -O /tmp/cmdtools.zip
    unzip -q /tmp/cmdtools.zip -d /opt/android-sdk/cmdline-tools
    mv /opt/android-sdk/cmdline-tools/cmdline-tools \
       /opt/android-sdk/cmdline-tools/latest
    rm /tmp/cmdtools.zip
  args:
    creates: /opt/android-sdk/cmdline-tools/latest

- name: Set Android environment variables
  lineinfile:
    path: /etc/profile.d/android.sh
    create: yes
    line: "{{ item }}"
  loop:
    - 'export ANDROID_HOME=/opt/android-sdk'
    - 'export JAVA_HOME=/usr/lib/jvm/java-17-openjdk'
    - 'export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin'
    - 'export PATH=$PATH:$ANDROID_HOME/platform-tools'

- name: Accept Android licenses
  shell: |
    yes 2>/dev/null | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
  environment:
    ANDROID_HOME: /opt/android-sdk
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk
    PATH: "/opt/android-sdk/cmdline-tools/latest/bin:/usr/lib/jvm/java-17-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  ignore_errors: yes  # sdkmanager exits non-zero even on success sometimes

- name: Install Android platform and build tools
  shell: |
    /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager \
      "platform-tools" \
      "platforms;android-34" \
      "platforms;android-35" \
      "build-tools;34.0.0" \
      "build-tools;35.0.0"
  environment:
    ANDROID_HOME: /opt/android-sdk
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk
    PATH: "/opt/android-sdk/cmdline-tools/latest/bin:/usr/lib/jvm/java-17-openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

- name: Create local.properties for Android project
  copy:
    dest: /home/git/calculus-app/local.properties
    owner: git
    group: git
    content: "sdk.dir=/opt/android-sdk\n"
